<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patch Explorer</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header>
    <div class="hdr-inner">
      <div class="hdr-left">
        <svg class="hdr-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l3-3 3 3"/><path d="M7.5 9.5v7"/><path d="M13.5 12.5l3-3 3 3"/><path d="M16.5 9.5v7"/></svg>
        <h1>Patch Explorer</h1>
      </div>
      <div class="hdr-links">
        <a class="hdr-gh" href="https://github.com/Paresh-Maheshwari/patch-explorer" target="_blank" title="Patch Explorer repo">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
        <a class="hdr-gh" href="https://github.com/Jman-Github/ReVanced-Patch-Bundles" target="_blank" title="Data source">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <div class="panel">
    <div class="panel-inner">
      <div class="panel-row">
        <nav id="tabs">
          <button class="tab active" data-view="apps"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="18" r=".5" fill="currentColor"/></svg> Apps</button>
          <button class="tab" data-view="bundles"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><path d="M12 22V13"/></svg> Bundles</button>
          <button class="tab" data-view="patches"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> All Patches</button>
        </nav>
        <div id="stats" class="stats"></div>
      </div>
      <div class="panel-search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search app, package, patch, bundle...">
        <select id="bundleFilter"><option value="">All Bundles</option></select>
        <select id="appFilter"><option value="">All Apps</option></select>
      </div>
    </div>
    <div id="progress"><div id="pbar"></div></div>
  </div>

  <main id="content"><div class="loader"><span class="spin"></span> Loading from GitHub...</div></main>
  <div id="modal" class="modal-bg hide"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
